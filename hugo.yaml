baseURL: "https://bysaqib.com/"
title: Saqib Razzaq — Unfiltered notes to self
theme: PaperMod
titleCaseStyle: none

pagination:
  pagerSize: 5

permalinks:
  posts: /posts/:year-:month-:day-:slug/

taxonomies:
  tag: tags

outputs:
  home:
    - HTML
    - RSS
    - JSON

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: Saqib Razzaq — Unfiltered notes to self
  description: "Unfiltered notes to self"
  keywords: [Blog, Saqib Razzaq, sakydev]
  author: Saqib Razzaq
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  label:
    text: "Home"

  # profile-mode
  profileMode:
    enabled: false # needs to be explicitly set

  # home-info mode
  homeInfoParams:
    Title: "Saqib Razzaq"
    Content: |
      Notes I didn't throw away. Mostly unedited. Written when it needed to get out.

      - [Articles](/tags/articles/): Longer thoughts I decided to defend properly.
      - [Poems](/tags/poems/): Feelings that didn't fit in a sentence.
      - [Stories](/tags/stories/): Things that may or may not have happened.
      - [Journal](/tags/journal/): Where the unfiltered stuff actually lives.

      Or [find out more about me](/about/).

  socialIcons:
    - name: github
      url: "https://github.com/sakydev"
    - name: linkedin
      url: "https://linkedin.com/in/sakydev"
    - name: instagram
      url: "https://www.instagram.com/sakib.razzaq/"
    - name: medium
      url: "https://medium.com/@saqibqx"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  editPost:
    URL: "https://github.com/sakydev/blog/tree/master/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 5
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 10
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 20
    - identifier: search
      name: Search
      url: /search/
      weight: 30
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    # anchorLineNos: true
    # codeFences: true
    # guessSyntax: true
    # lineNos: true
    # style: monokai